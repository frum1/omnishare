services:
  omnishare:
    image: ghcr.io/frum1/omnishare:latest
    container_name: omnishare
    restart: unless-stopped

    # --- Build from source instead (dev/local iteration) ---
    # build: .

    # The service listens on LOCAL_PORT (default 8000) directly
    # on the host — no port mapping needed.
    network_mode: host

    volumes:
      - ./.env:/app/.env
      # SQLite database
      - ./data:/app/data
      # Uploaded files
      # If you want to use a different storage location, change this
      - ./storage:/app/storage

  # Reverse proxy with automatic HTTPS (Let's Encrypt via Caddy). Opt-in via
  # `COMPOSE_PROFILES=proxy` in .env. Needs port-forwarding for PUBLIC_BASE_URL pointed at
  # this server — see README's "Public HTTPS" section.
  caddy:
    image: caddy:2-alpine
    container_name: omnishare-caddy
    restart: unless-stopped
    profiles: ["proxy"]

    network_mode: host

    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile

    volumes:
      - caddy_data:/data
      - caddy_config:/config

configs:
  caddyfile:
    content: |
      ${PUBLIC_BASE_URL} {
        reverse_proxy localhost:${LOCAL_PORT:-8000}
      }

volumes:
  caddy_data:
  caddy_config:
